name: Daily stock recommendations email

on:
  schedule:
    # 09:30 AM IST = 04:00 UTC (after Indian markets open at 09:15)
    - cron: "0 4 * * 1-5"  # Mon–Fri only (NSE holidays still send; harmless)
  workflow_dispatch:        # manual trigger from the Actions tab

permissions:
  contents: read

jobs:
  send-report:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync

      - name: Run daily-email script
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST || 'smtp.gmail.com' }}
          SMTP_PORT: ${{ secrets.SMTP_PORT || '465' }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          REPORT_EMAIL_TO: ${{ secrets.REPORT_EMAIL_TO }}
        run: uv run python scripts/daily_email.py

      - name: Upload PDF as artifact (retained for 14 days)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-recommendations
          path: data/daily_recommendations_*.pdf
          retention-days: 14
